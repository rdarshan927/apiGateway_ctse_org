server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}
  cloud:
    gateway:
      routes:
        # User Service Routes
        - id: user-service
          uri: ${USER_SERVICE_URL:https://userservice-7mt1.onrender.com}
          predicates:
            - Path=/api/auth/**, /api/users/**
          filters:
            - RewritePath=/api/(?<segment>.*), /api/$\{segment}
            
        # Doctor Service Routes  
        - id: doctor-service
          uri: ${DOCTOR_SERVICE_URL:https://doctor-service-efc3c5f3xa-uc.a.run.app}
          predicates:
            - Path=/api/doctors/**, /api/slots/**
          filters:
            - RewritePath=/api/(?<segment>.*), /api/$\{segment}
      
      # Global CORS configuration
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "https://clinicsliitmicroservice.netlify.app"
              - "http://localhost:3000"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

# Actuator endpoints for health checks
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: INFO
    root: INFO