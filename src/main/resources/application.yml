server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: api-gateway
  profiles:
    active: prod
  cloud:
    gateway:
      routes:
        # User Service Routes
        - id: user-service
          uri: https://user-service-78514746924.europe-west1.run.app
          predicates:
            - Path=/api/auth/**, /api/users/**
          filters:
            - RewritePath=/api/(?<segment>.*), /api/$\{segment}

        # Doctor Service Routes
        - id: doctor-service
          uri: https://doctor-service-78514746924.europe-west1.run.app
          predicates:
            - Path=/api/doctors/**, /api/slots/**
          filters:
            - RewritePath=/api/(?<segment>.*), /api/$\{segment}

        # Payment Service Routes
        - id: payment-service
          uri: https://payment-service-78514746924.europe-west1.run.app
          predicates:
            - Path=/api/payments/**
          filters:
            - RewritePath=/api/(?<segment>.*), /api/$\{segment}

        # Updated Appointment Service Route with StripPrefix=2
        - id: appointment-service
          uri: https://appointment-service-78514746924.europe-west1.run.app
          predicates:
            - Path=/api/appointments/**
          filters:
            - RewritePath=/api/(?<segment>.*), /api/$\{segment}

        # Patient Service Routes
        - id: patient-service
          uri: https://patientservice-78514746924.europe-west1.run.app
          predicates:
            - Path=/api/patients/**
          filters:
            - RewritePath=/api/(?<segment>.*), /api/$\{segment}

      # Global CORS configuration
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "https://clinicsliitmicroservice.netlify.app"
              - "http://localhost:3000"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

# Actuator endpoints for health checks
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: INFO
    root: INFO